services:
  web:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: webapp-frontend
    environment:
      API_URL: http://api:80
    mem_reservation: 10m
    mem_limit: 20m
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - api

  api:
    build:
      context: backend
      dockerfile: Dockerfile
    image: webapp-backend
    environment:
      PORT: 80
      DATABASE_URL: postgresql://webapp:secret@db:5432/webapp
    mem_reservation: 100m
    mem_limit: 200m
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: webapp
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: webapp
    mem_reservation: 100m
    mem_limit: 200m
    ports:
      - "127.0.0.1:55432:5432"
